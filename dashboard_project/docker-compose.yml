services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dashboard
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      ASYNC_DB_URL: postgresql+asyncpg://postgres:postgres@db:5432/dashboard
      SYNC_DB_URL: postgresql+psycopg2://postgres:postgres@db:5432/dashboard

      REDIS_URL: ${REDIS_URL:-redis://host.docker.internal:6379/0}

      SECRET_KEY: ${SECRET_KEY:-change_me}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_DAYS: ${ACCESS_TOKEN_EXPIRE_DAYS:-7}
    depends_on:
      - db
    command: sh -c "alembic upgrade head && uvicorn dashboard_app.main:dashboard_app --host 0.0.0.0 --port 8080"

volumes:
  pgdata: